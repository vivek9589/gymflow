# ==========================
# SERVER
# ==========================
server.port=${SERVER_PORT:8080}

# ==========================
# DATABASE
# ==========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# HIKARI POOL
# ==========================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ==========================
# JPA / HIBERNATE
# ==========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
# spring.jpa.open-in-view=false
# not recomemded in production  , later change it usieng projection or @Transactional
spring.jpa.open-in-view=true

# ==========================
# FLYWAY
# ==========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==========================
# SECURITY
# ==========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ==========================
# INTEGRATIONS
# ==========================
n8n.webhook-url=${N8N_WEBHOOK_URL}

evolution.api-url=${EVO_INTERNAL_URL}
evolution.api-key=${EVO_API_KEY}
evolution.instance-name=gymflow-whatsapp

# ==========================
# LOGGING
# ==========================
logging.level.root=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework=INFO

# ==========================
# TWILIO
# ==========================
twilio.whatsapp.api-url=${TWILIO_WHATSAPP_API_URL}
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}

# ACTUATOR FIX
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true