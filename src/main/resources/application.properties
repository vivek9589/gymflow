# ==========================
# APPLICATION SETTINGS
# ==========================
spring.application.name=gymflow
server.port=8081

# ==========================
# DATABASE SETTINGS (MySQL)
# ==========================
# Added useSSL=false and allowPublicKeyRetrieval to prevent common connection errors
spring.datasource.url=jdbc:mysql://localhost:3306/gym_saas?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# HIKARI CONNECTION POOL (Performance)
# ==========================
# Standard pool size for a small-medium SaaS
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ==========================
# JPA / HIBERNATE SETTINGS
# ==========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Makes the SQL in your console look clean and readable
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Recommended to avoid "LazyInitializationException" issues during development
spring.jpa.open-in-view=true

# ==========================
# SECURITY & JWT SETTINGS
# ==========================
# Cryptographically secure 512-bit key (64 chars)
jwt.secret=4f78306e5367526b384a6a4c5a51326d50317134723573367638792f422b452d472b4b425064536756625530
# 10 Hours expiration (in milliseconds)
jwt.expiration=36000000

# ==========================
# LOGGING
# ==========================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG

# SWAGGER
# ==================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Isse agar koi mapping issue hai toh detail dikhegi
springdoc.show-actuator=true


spring.jackson.serialization.fail-on-empty-beans=false