# ==========================
# SERVER SETTINGS
# ==========================
server.port=${SERVER_PORT:8082}
# spring.profiles.active=dev   # already set in base, commented

# ==========================
# DATABASE SETTINGS (MySQL)
# ==========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==========================
# HIKARI CONNECTION POOL
# ==========================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ==========================
# JPA / HIBERNATE SETTINGS
# ==========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# ==========================
# SECURITY & JWT SETTINGS
# ==========================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ==========================
# LOGGING
# ==========================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG

# ==========================
# N8n Integration
# ==========================
n8n.webhook-url=${N8N_WEBHOOK_URL}

twilio.whatsapp.api-url=https://api.twilio.com/send-whatsapp

# ==========================
# Evolution API
# ==========================
evolution.api-url=${EVO_INTERNAL_URL}
evolution.instance-name=gymflow-whatsapp
evolution.api-key=${EVO_API_KEY}