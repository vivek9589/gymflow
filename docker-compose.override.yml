services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: gym_saas
    # No need to expose ports unless you want to connect from host
    # ports:
    #   - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  gymflow-app:
    build: .
    ports:
      - "8082:8082"
    env_file:
      - .env.dev
    depends_on:
      mysql:
        condition: service_healthy